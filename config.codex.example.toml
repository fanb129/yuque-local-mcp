[mcp_servers.yuque]
command = "node"
args = ["/Users/fanb/Documents/Codex/2026-06-23/wo-x/dist/index.js"]
startup_timeout_sec = 20
tool_timeout_sec = 180
default_tools_approval_mode = "prompt"

[mcp_servers.yuque.env]
YUQUE_MCP_CONFIG = "/Users/fanb/Documents/Codex/2026-06-23/wo-x/config.json"

[mcp_servers.yuque.tools.yuque_allowed_books]
